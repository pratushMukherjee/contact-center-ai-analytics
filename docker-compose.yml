version: '3.8'

# Optional: Use PostgreSQL instead of H2 for production-like setup
# Run with: docker-compose up -d
# Then set spring.profiles.active=docker

services:
  postgres:
    image: postgres:16-alpine
    container_name: ccai-postgres
    environment:
      POSTGRES_DB: ccai
      POSTGRES_USER: ccai
      POSTGRES_PASSWORD: ccai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ccai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ccai.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
